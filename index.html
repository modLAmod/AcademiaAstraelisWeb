<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Academia Astraelis – Inicio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #4b0082, #050010);
            color: #f5e9ff;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 32px 24px;
            background: rgba(5, 0, 20, 0.85);
            border-radius: 18px;
            border: 1px solid rgba(199, 158, 255, 0.6);
            box-shadow: 0 0 40px rgba(120, 60, 255, 0.4);
            text-align: center;
        }
        .title {
            font-family: "Cinzel", serif;
            font-size: 28px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #e7d0ff;
        }
        .subtitle {
            font-size: 14px;
            color: #c9b3ff;
            margin-bottom: 28px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 999px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            text-decoration: none;
            color: #fff;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.4);
            opacity: 0.95;
        }
        .btn.discord {
            background: #5865F2;
        }
        .btn.steam {
            background: #171a21;
        }
        .hint {
            margin-top: 18px;
            font-size: 12px;
            color: #a894ff;
            opacity: 0.9;
        }
        .tagline {
            margin-top: 20px;
            font-size: 13px;
            color: #e0d2ff;
        }
        .pill {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(199, 158, 255, 0.6);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #d9c7ff;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1 class="title">Academia Astraelis</h1>
        <p class="subtitle">
            Un servidor de rol donde el Aether, la Ruina y tu historia se cruzan.
        </p>

        <!-- IMPORTANTE:
             Cambia estas URLs cuando tengas tu backend OAuth desplegado.
             Por ahora pueden apuntar a "#", solo para el diseño.
        -->

        <a href="http://localhost:3000/auth/discord" class="btn discord">
            Iniciar sesión con Discord
        </a>

        <a href="http://localhost:3000/auth/steam" class="btn steam">
            Iniciar sesión con Steam
        </a>

        <p class="hint">
            Al iniciar sesión, accederás al panel de la Academia, creación de personaje y más.
        </p>

        <p class="tagline">
            Tu destino en Astraelis está a un clic.
        </p>
        <div class="pill">Acceso a la Academia</div>
    </main>
</body>
</html>
